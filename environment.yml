# Conda/mamba environment for hydroBayesCal.
#
# Python dependencies are defined once in pyproject.toml; this file only pins
# the interpreter and lets pip install the project (and its dependencies) in
# editable mode. bayesvalidrox currently requires python < 3.12.
#
#   mamba env create -f environment.yml
#   mamba activate hbenv
name: hbenv
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.12
  - pip
  - pip:
      - -e .[dev,docs,mesh,server]
