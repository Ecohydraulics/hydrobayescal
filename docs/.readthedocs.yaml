# Read the Docs configuration file for Sphinx projects.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # The docs build clean; fail the build on any new warning to catch regressions.
  fail_on_warning: true

# Build additional formats (the PDF is linked from the docs).
formats:
  - pdf

# Only the lightweight documentation requirements are installed; the heavy
# runtime dependencies are mocked in conf.py (autodoc_mock_imports).
python:
  install:
    - requirements: docs/requirements-docs.txt
